name: Daily Feature Push

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  generate-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Feature
        id: feature
        run: |
          node .github/scripts/generate-feature.js
          echo "feature_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "feature_time=$(date +%H:%M:%S)" >> $GITHUB_OUTPUT

      - name: Create feature branch and commit
        run: |
          BRANCH_NAME="feat/daily-$(date +%Y%m%d)"
          git checkout -b ${BRANCH_NAME}
          git add src/analyzers/
          git commit -m "feat: Add daily feature - $(date +%Y-%m-%d)" || true
          git push origin ${BRANCH_NAME}
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

      - name: Create Pull Request with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="feat/daily-$(date +%Y%m%d)"
          BODY="## 🎯 Daily Feature Push

Date: $(date +%Y-%m-%d)

Changes:
- ✨ Auto-generated feature with actual code
- 📝 Production-ready implementation
- 🔍 Ready for code review"
          
          gh pr create \
            --title "Daily Feature: $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --base main \
            --head $BRANCH_NAME || true
